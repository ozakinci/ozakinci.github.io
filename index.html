<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Our Dates</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #faf8f4;
      --surface:   #f3efe8;
      --text:      #2e2a25;
      --muted:     #9c8f82;
      --accent:    #b5705a;
      --soft-blue: #7a9baa;
      --soft-green:#7a9e83;
      --border:    #e5dfd6;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      padding: 3rem 1.5rem 5rem;
    }

    header {
      max-width: 860px;
      margin: 0 auto 3rem;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.2rem, 5vw, 3.2rem);
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.1;
      color: var(--text);
    }

    h1 span {
      color: var(--accent);
      font-style: italic;
    }

    .subtitle {
      margin-top: 0.5rem;
      color: var(--muted);
      font-size: 0.85rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .table-wrap {
      max-width: 860px;
      margin: 0 auto;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      text-align: left;
      font-family: 'Jost', sans-serif;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0 1rem 0.9rem;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
      border-bottom: 1px solid var(--border);
    }

    thead th:hover { color: var(--accent); }

    thead th .sort-icon {
      display: inline-block;
      margin-left: 4px;
      opacity: 0.3;
      font-size: 0.65rem;
      transition: opacity 0.15s;
    }

    thead th.active .sort-icon { opacity: 1; color: var(--accent); }

    tbody tr {
      transition: background 0.15s;
    }

    tbody tr:hover { background: var(--surface); }

    tbody td {
      padding: 1.1rem 1rem;
      vertical-align: top;
      border-bottom: 1px solid var(--border);
    }

    /* TYPE BADGE */
    .badge {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.2em 0.65em;
      border-radius: 2rem;
      white-space: nowrap;
    }

    .badge-birthday   { background: #f5e8d8; color: #a0622e; }
    .badge-anniversary{ background: #dde9f0; color: #3d7290; }
    .badge-countdown  { background: #deeee3; color: #356b42; }
    .badge-milestone  { background: #ece8f2; color: #5e4b8a; }
    .badge-default    { background: var(--surface); color: var(--muted); }

    /* TITLE */
    .title-cell {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem;
      font-weight: 600;
      line-height: 1.2;
      color: var(--text);
    }

    .date-label {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 0.2rem;
      font-family: 'Jost', sans-serif;
    }

    /* TIME CELL */
    .time-main {
      font-size: 0.95rem;
      font-weight: 400;
      color: var(--text);
      line-height: 1.4;
    }

    .time-main.future { color: var(--soft-green); }
    .time-main.past   { color: var(--muted); }
    .time-main.age    { color: var(--accent); font-weight: 500; }

    .time-sub {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 0.2rem;
    }

    /* LIVE DOT */
    .live-dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--soft-green);
      margin-right: 6px;
      vertical-align: middle;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    footer {
      max-width: 860px;
      margin: 3rem auto 0;
      font-size: 0.75rem;
      color: var(--border);
      text-align: right;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

<header>
  <h1>Our <span>Dates</span></h1>
  <p class="subtitle">The moments that matter</p>
</header>

<div class="table-wrap">
  <table id="mainTable">
    <thead>
      <tr>
        <th data-col="type">Type <span class="sort-icon">↕</span></th>
        <th data-col="title">Title <span class="sort-icon">↕</span></th>
        <th data-col="time">Time <span class="sort-icon">↕</span></th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<footer id="lastUpdated"></footer>

<script>
// ─────────────────────────────────────────────
//  ADD YOUR ENTRIES HERE
//  Fields:
//    title : string
//    date  : "YYYY-MM-DD"
//    type  : "birthday" | "anniversary" | "countdown" | "milestone" | any string
//
//  birthday    → shows current age + days until next birthday
//  anniversary → shows years elapsed + days until next anniversary
//  countdown   → future: "X to go", past: "X ago"
//  milestone   → past event, always counts up
//  anything else → same as countdown
//
//  Copy-paste template:
//  { title: "Name or event", date: "YYYY-MM-DD", type: "birthday" },
// ─────────────────────────────────────────────
const ENTRIES = [
  { title: "Tayfun",             date: "1974-11-05", type: "birthday"    },
  { title: "Irmak",              date: "1975-10-15", type: "birthday"    },
  { title: "Deniz",              date: "2012-02-17", type: "birthday"    },
  { title: "Su",                 date: "2014-06-06", type: "birthday"    },
  { title: "Derin",              date: "2014-06-06", type: "birthday"    },
  { title: "Kalpler Bir",        date: "2010-09-27", type: "anniversary" },
  { title: "Istanbul",           date: "2026-04-05", type: "holiday"     },
  { title: "Barco",              date: "2011-02-01", type: "milestone"   },
];
// ─────────────────────────────────────────────

// ── Utilities ──────────────────────────────
function parseDate(str) {
  const [y, m, d] = str.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function ymd(from, to) {
  // Returns { years, months, days } between two dates (to > from)
  let y = to.getFullYear() - from.getFullYear();
  let m = to.getMonth()    - from.getMonth();
  let d = to.getDate()     - from.getDate();
  if (d < 0) { m--; d += new Date(to.getFullYear(), to.getMonth(), 0).getDate(); }
  if (m < 0) { y--; m += 12; }
  return { years: y, months: m, days: d };
}

function formatYMD({ years, months, days }, suffix) {
  const parts = [];
  if (years  > 0) parts.push(years  + (years  === 1 ? ' year'  : ' years'));
  if (months > 0) parts.push(months + (months === 1 ? ' month' : ' months'));
  if (days   > 0 || parts.length === 0) parts.push(days + (days === 1 ? ' day' : ' days'));
  return parts.join(' ') + (suffix ? ' ' + suffix : '');
}

function nextOccurrence(date, now) {
  // Returns next date with same month/day on or after today
  const next = new Date(now.getFullYear(), date.getMonth(), date.getDate());
  if (next < now) next.setFullYear(next.getFullYear() + 1);
  return next;
}

function daysFromNow(entry, now) {
  // Used for sorting by time
  const date = parseDate(entry.date);
  const type = entry.type.toLowerCase();
  if (type === 'birthday' || type === 'anniversary') {
    const next = nextOccurrence(date, now);
    return Math.round((next - now) / 86400000);
  }
  return Math.round((date - now) / 86400000);
}

// ── Badge ───────────────────────────────────
function badgeClass(type) {
  const t = type.toLowerCase();
  if (t === 'birthday')    return 'badge-birthday';
  if (t === 'anniversary') return 'badge-anniversary';
  if (t === 'countdown')   return 'badge-countdown';
  if (t === 'milestone')   return 'badge-milestone';
  return 'badge-default';
}

// ── Time cell ────────────────────────────────
function buildTimeCell(entry, now) {
  const date = parseDate(entry.date);
  const type = entry.type.toLowerCase();
  let mainClass = '', mainText = '', subText = '';

  if (type === 'birthday') {
    const age = ymd(date, now);
    const next = nextOccurrence(date, now);
    const toNext = ymd(now, next);
    mainClass = 'age';
    mainText  = age.years + ' years old';
    subText   = formatYMD(toNext, 'until next birthday');

  } else if (type === 'anniversary') {
    const elapsed = ymd(date, now);
    const next    = nextOccurrence(date, now);
    const toNext  = ymd(now, next);
    mainClass = elapsed.years > 0 ? 'past' : 'future';
    mainText  = formatYMD(elapsed, elapsed.years > 0 ? 'together' : 'to go');
    subText   = formatYMD(toNext, 'until next anniversary');

  } else {
    // countdown / milestone / custom
    if (date > now) {
      mainClass = 'future';
      mainText  = formatYMD(ymd(now, date), 'to go');
    } else {
      mainClass = 'past';
      mainText  = formatYMD(ymd(date, now), 'ago');
    }
  }

  return { mainClass, mainText, subText };
}

// ── Render ───────────────────────────────────
let sortCol = 'time', sortDir = -1;

function render() {
  const now = new Date();
  const tbody = document.getElementById('tableBody');

  // Sort
  const sorted = [...ENTRIES].sort((a, b) => {
    let va, vb;
    if (sortCol === 'type') {
      va = a.type.toLowerCase(); vb = b.type.toLowerCase();
      const typeCmp = sortDir * va.localeCompare(vb);
      if (typeCmp !== 0) return typeCmp;
      return a.title.toLowerCase().localeCompare(b.title.toLowerCase());
    }
    if (sortCol === 'title') {
      va = a.title.toLowerCase(); vb = b.title.toLowerCase();
      return sortDir * va.localeCompare(vb);
    }
    // time: sort by original date
    va = parseDate(a.date).getTime(); vb = parseDate(b.date).getTime();
    return sortDir * (va - vb);
  });

  tbody.innerHTML = sorted.map(entry => {
    const { mainClass, mainText, subText } = buildTimeCell(entry, now);
    const date = parseDate(entry.date);
    const dateLabel = date.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });

    return `<tr>
      <td><span class="badge ${badgeClass(entry.type)}">${entry.type}</span></td>
      <td>
        <div class="title-cell">${entry.title}</div>
        <div class="date-label">${dateLabel}</div>
      </td>
      <td>
        <div class="time-main ${mainClass}">
          <span class="live-dot"></span>${mainText}
        </div>
        ${subText ? `<div class="time-sub">${subText}</div>` : ''}
      </td>
    </tr>`;
  }).join('');

  document.getElementById('lastUpdated').textContent =
    'Updated ' + now.toLocaleTimeString();
}

// ── Sorting ──────────────────────────────────
document.querySelectorAll('thead th').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (sortCol === col) { sortDir *= -1; }
    else { sortCol = col; sortDir = 1; }

    document.querySelectorAll('thead th').forEach(t => t.classList.remove('active'));
    th.classList.add('active');
    th.querySelector('.sort-icon').textContent = sortDir === 1 ? '↓' : '↑';
    render();
  });
});

// ── Init ─────────────────────────────────────
render();
setInterval(render, 60000); // refresh every minute
</script>
</body>
</html>
